spring:
  datasource:
    url: jdbc:h2:mem:ats_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

ats:
  jwt:
    secret: test-jwt-secret-for-integration-tests-only
  upload-dir: ${java.io.tmpdir}/ats-test-uploads
